<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>INeedPOSN — ห้องเรียน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=Noto+Serif+Thai:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

    /* ── THEME VARS ── */
    :root {
      --bg:#0a0a0a; --sf:#111; --sf2:#191919; --sf3:#222;
      --b:rgba(255,255,255,.07); --b2:rgba(255,255,255,.13);
      --t:#f0f0f0; --t2:#a0a0a0; --t3:#555;
      --gold:#ffd60a; --bio:#30d158; --chem:#0a84ff; --com:#bf5af2; --warm:#ff9f0a; --red:#ff453a;
      --sh:0 4px 32px rgba(0,0,0,.5);
      --accent:var(--bio);
    }
    [data-theme="light"] {
      --bg:#f0ede8; --sf:#fff; --sf2:#f7f5f1; --sf3:#eceae5;
      --b:rgba(0,0,0,.07); --b2:rgba(0,0,0,.13);
      --t:#111; --t2:#555; --t3:#aaa;
      --sh:0 4px 32px rgba(0,0,0,.10);
    }
    @media(prefers-color-scheme:light){
      :root:not([data-theme="dark"]){
        --bg:#f0ede8;--sf:#fff;--sf2:#f7f5f1;--sf3:#eceae5;
        --b:rgba(0,0,0,.07);--b2:rgba(0,0,0,.13);
        --t:#111;--t2:#555;--t3:#aaa;--sh:0 4px 32px rgba(0,0,0,.10);
      }
    }

    body{background:var(--bg);color:var(--t);font-family:'DM Sans','Noto Serif Thai',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;transition:background .25s,color .25s;}

    /* ── TOPBAR ── */
    .topbar{height:54px;background:var(--sf);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:var(--sh);}
    .tb-logo{font-family:'Playfair Display',serif;font-size:1.1rem;letter-spacing:.04em;text-decoration:none;color:var(--t);}
    .tb-logo span{color:var(--gold);}
    .tb-right{display:flex;align-items:center;gap:10px;}
    .tb-user{font-size:.78rem;color:var(--t2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .tb-course-badge{padding:3px 9px;border-radius:40px;font-size:.65rem;font-weight:700;letter-spacing:.04em;}
    .tb-btn{padding:6px 14px;border:1px solid var(--b2);border-radius:8px;background:none;color:var(--t2);font-size:.74rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
    .tb-btn:hover{color:var(--t);border-color:var(--t3);}
    .tb-theme{padding:6px 10px;border:1px solid var(--b2);border-radius:8px;background:none;cursor:pointer;font-size:.95rem;line-height:1;transition:all .2s;}
    .tb-theme:hover{background:var(--sf2);}

    /* ── LOGIN VIEW ── */
    #v-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-card{background:var(--sf);border:1px solid var(--b2);border-radius:24px;padding:44px 40px;width:100%;max-width:400px;box-shadow:var(--sh);}
    .login-logo{font-family:'Playfair Display',serif;font-size:1.5rem;text-align:center;margin-bottom:4px;}
    .login-logo span{color:var(--gold);}
    .login-sub{font-size:.78rem;color:var(--t2);text-align:center;margin-bottom:32px;}
    .lf{margin-bottom:14px;}
    .lf label{display:block;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t2);margin-bottom:6px;}
    .lf input{width:100%;padding:11px 14px;background:var(--sf2);border:1px solid var(--b2);border-radius:10px;color:var(--t);font-size:.88rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
    .lf input:focus{border-color:var(--gold);}
    .lf input.err{border-color:var(--red);}
    .login-err{font-size:.74rem;color:var(--red);background:rgba(255,69,58,.08);border:1px solid rgba(255,69,58,.2);border-radius:8px;padding:9px 12px;margin-bottom:12px;display:none;}
    .login-err.show{display:block;}
    .btn-login{width:100%;padding:13px;background:var(--gold);color:#000;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
    .btn-login:hover{background:#e5c009;transform:scale(1.01);}
    .btn-login.loading{background:#555;color:transparent;position:relative;pointer-events:none;}
    .btn-login.loading::after{content:'';position:absolute;top:50%;left:50%;width:16px;height:16px;border:2px solid #888;border-top-color:#fff;border-radius:50%;transform:translate(-50%,-50%);animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
    .login-note{font-size:.7rem;color:var(--t3);text-align:center;margin-top:18px;}
    .login-theme-wrap{display:flex;justify-content:center;margin-bottom:20px;}

    /* ── DASHBOARD VIEW ── */
    #v-dashboard{display:none;}
    .dash-wrap{max-width:700px;margin:40px auto;padding:0 20px;}
    .dash-greeting{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:600;margin-bottom:4px;}
    .dash-sub{font-size:.85rem;color:var(--t2);margin-bottom:32px;}

    .course-card-big{background:var(--sf);border:1px solid var(--b2);border-radius:20px;padding:28px;box-shadow:var(--sh);overflow:hidden;position:relative;}
    .ccb-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;}
    .ccb-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;}
    .ccb-info{flex:1;}
    .ccb-eyebrow{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}
    .ccb-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;line-height:1.2;}

    .status-banner{border-radius:12px;padding:14px 16px;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
    .status-pending{background:rgba(255,159,10,.08);border:1px solid rgba(255,159,10,.2);}
    .status-approved{background:rgba(48,209,88,.08);border:1px solid rgba(48,209,88,.2);}
    .status-rejected{background:rgba(255,69,58,.08);border:1px solid rgba(255,69,58,.2);}
    .sb-icon{font-size:1.4rem;}
    .sb-text{font-size:.8rem;line-height:1.6;}
    .sb-text strong{display:block;font-size:.85rem;margin-bottom:1px;}
    .status-pending .sb-text strong{color:var(--warm);}
    .status-approved .sb-text strong{color:var(--bio);}
    .status-rejected .sb-text strong{color:var(--red);}

    .progress-bar-wrap{margin-bottom:18px;}
    .progress-label{display:flex;justify-content:space-between;font-size:.72rem;color:var(--t2);margin-bottom:6px;}
    .progress-bar{height:6px;background:var(--sf3);border-radius:4px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:4px;transition:width .4s ease;}

    .btn-enter{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-align:center;}
    .btn-enter:hover{transform:scale(1.01);}
    .btn-enter:disabled{opacity:.4;cursor:not-allowed;transform:none;}

    /* ── COURSE PLAYER VIEW ── */
    #v-course{display:none;height:calc(100vh - 54px);}
    .player-layout{display:grid;grid-template-columns:300px 1fr;height:100%;}

    /* Sidebar */
    .sidebar{background:var(--sf);border-right:1px solid var(--b);overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;}
    .sidebar::-webkit-scrollbar{width:5px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px;}
    .sidebar-head{padding:18px 16px 14px;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--sf);z-index:5;}
    .sidebar-course-title{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:600;margin-bottom:4px;}
    .sidebar-progress{font-size:.68rem;color:var(--t2);}
    .sidebar-prog-bar{height:3px;background:var(--sf3);border-radius:2px;margin-top:6px;overflow:hidden;}
    .sidebar-prog-fill{height:100%;border-radius:2px;transition:width .3s;}

    .video-section-label{padding:10px 16px 4px;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);}
    .video-item{padding:10px 14px;cursor:pointer;transition:background .15s;display:flex;gap:10px;align-items:flex-start;border-left:3px solid transparent;}
    .video-item:hover{background:var(--sf2);}
    .video-item.active{background:var(--sf2);border-left-color:var(--accent);}
    .vi-num{font-size:.68rem;font-weight:700;color:var(--t3);min-width:18px;margin-top:2px;flex-shrink:0;}
    .vi-check{font-size:.85rem;min-width:18px;margin-top:1px;flex-shrink:0;}
    .video-item.active .vi-num{color:var(--accent);}
    .vi-text{}
    .vi-title{font-size:.8rem;font-weight:500;line-height:1.4;color:var(--t);}
    .video-item.active .vi-title{color:var(--accent);font-weight:600;}
    .vi-meta{font-size:.65rem;color:var(--t3);margin-top:2px;}
    .video-item.watched .vi-title{color:var(--t2);}

    /* Main player area */
    .player-main{overflow-y:auto;display:flex;flex-direction:column;}
    .player-main::-webkit-scrollbar{width:6px;}
    .player-main::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
    .video-container{position:relative;width:100%;aspect-ratio:16/9;background:#000;flex-shrink:0;}
    .video-container iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
    .video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);gap:12px;}
    .video-placeholder .big{font-size:3rem;}
    .video-placeholder p{font-size:.8rem;}

    .video-info{padding:20px 24px;}
    .vi-badge-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
    .vi-badge{padding:3px 9px;border-radius:6px;font-size:.65rem;font-weight:700;letter-spacing:.04em;}
    .video-title-big{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:600;line-height:1.3;margin-bottom:8px;}
    .video-desc{font-size:.82rem;color:var(--t2);line-height:1.7;margin-bottom:16px;}
    .mark-btn{padding:9px 18px;border-radius:10px;border:none;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}

    /* Materials */
    .materials-section{padding:0 24px 28px;}
    .mat-title{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;padding-top:16px;border-top:1px solid var(--b);}
    .mat-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--sf2);border:1px solid var(--b);border-radius:10px;margin-bottom:8px;text-decoration:none;color:var(--t);transition:all .2s;}
    .mat-item:hover{border-color:var(--b2);background:var(--sf3);}
    .mat-icon{font-size:1.1rem;flex-shrink:0;}
    .mat-name{font-size:.8rem;font-weight:500;flex:1;}
    .mat-type{font-size:.65rem;color:var(--t3);flex-shrink:0;}
    .mat-empty{font-size:.78rem;color:var(--t3);padding:10px 0;}

    /* Kicked overlay */
    #kicked-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:20px;}
    #kicked-overlay.show{display:flex;}
    .kicked-card{background:var(--sf);border:1px solid var(--b2);border-radius:20px;padding:36px;max-width:400px;width:100%;text-align:center;box-shadow:var(--sh);}
    .kicked-icon{font-size:3rem;margin-bottom:12px;}
    .kicked-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:600;margin-bottom:8px;}
    .kicked-desc{font-size:.8rem;color:var(--t2);line-height:1.7;margin-bottom:20px;}

    /* Empty / no content state */
    .empty-state{text-align:center;padding:48px 20px;color:var(--t3);}
    .empty-state .big{font-size:2.5rem;margin-bottom:10px;}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sf);border:1px solid var(--b2);border-radius:40px;padding:10px 20px;font-size:.8rem;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;box-shadow:var(--sh);}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.g{border-color:rgba(48,209,88,.3);color:var(--bio);}
    .toast.r{border-color:rgba(255,69,58,.3);color:var(--red);}

    /* Mobile */
    .sidebar-toggle{display:none;}
    @media(max-width:768px){
      .player-layout{grid-template-columns:1fr;position:relative;}
      .sidebar{position:fixed;top:54px;left:0;bottom:0;width:280px;z-index:50;transform:translateX(-100%);transition:transform .3s;box-shadow:4px 0 20px rgba(0,0,0,.3);}
      .sidebar.open{transform:translateX(0);}
      .sidebar-toggle{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--b2);border-radius:8px;background:none;color:var(--t2);font-size:.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
      .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;display:none;}
      .sidebar-overlay.show{display:block;}
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════

      <button class="tb-theme" onclick="toggleTheme()" id="loginThemeBtn" style="border-radius:40px;padding:6px 12px;font-size:.8rem;display:flex;align-items:center;gap:6px;color:var(--t2);font-family:'DM Sans',sans-serif;">

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════════ -->
<script>
// ════════════════════════════════════
// THEME
// ════════════════════════════════════
function isDark(){
  const t=document.documentElement.getAttribute('data-theme');
  if(t) return t==='dark';
  return !window.matchMedia('(prefers-color-scheme: light)').matches;
}
function applyTheme(){
  const dark=isDark();
  document.getElementById('themeBtn').textContent=dark?'🌙':'☀️';
  document.getElementById('loginThemeBtn') && updateLoginThemeBtn(dark);
}
function updateLoginThemeBtn(dark){
  const b=document.getElementById('loginThemeBtn');
  if(!b)return;
  document.getElementById('loginThemeIcon').textContent=dark?'🌙':'☀️';
  document.getElementById('loginThemeTxt').textContent=dark?'Dark Mode':'Light Mode';
}
function toggleTheme(){
  const next=isDark()?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('inp_theme',next);
  applyTheme();
}
// Init theme
(()=>{
  const saved=localStorage.getItem('inp_theme');
  if(saved) document.documentElement.setAttribute('data-theme',saved);
  applyTheme();
})();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',applyTheme);

// ════════════════════════════════════
// DATA ACCESS
// ════════════════════════════════════
async function getUsers(){
  const res = await fetch("https://script.google.com/macros/s/AKfycbwUH2kNYL4gb6aDosycckfbwn5Fh6ajP4RVLGnlx6ozUx28GbIJ8eASMELZj8qbAF4c/exec?action=get_users");
  const data = await res.json();
  return data.users || [];
}
function saveUsers(u){localStorage.setItem('inp_users',JSON.stringify(u));}
function getContent(){
  const def={bio:{videos:[],materials:[]},chem:{videos:[],materials:[]},com:{videos:[],materials:[]}};
  return JSON.parse(localStorage.getItem('inp_content')||JSON.stringify(def));
}

// ════════════════════════════════════
// SESSION (SINGLE DEVICE)
// ════════════════════════════════════
function genToken(){return Math.random().toString(36).slice(2)+Date.now().toString(36)+Math.random().toString(36).slice(2);}

function saveSession(userId,token){
  localStorage.setItem('inp_sess',JSON.stringify({userId,token,time:Date.now()}));
}
function getSession(){return JSON.parse(localStorage.getItem('inp_sess')||'null');}
function clearSession(){localStorage.removeItem('inp_sess');}

async function checkSession(){
  const sess = getSession();
  if(!sess) return null;

  const users = await getUsers();
  const user = users.find(u => u.id === sess.userId);

  if(!user || user.activeSessionToken !== sess.token) return null;
  return user;
}

// Periodic check (every 20 seconds)
let sessInterval=null;
function startSessionWatch(){
  clearInterval(sessInterval);
  sessInterval = setInterval(async ()=>{
    const u = await checkSession();
    if(!u && APP.currentUser){
      clearInterval(sessInterval);
      showKicked();
    }
  },20000);
}
window.addEventListener('focus', async ()=>{
  if(APP.currentUser){
    const u = await checkSession();
    if(!u){showKicked();}
  }
});

// ════════════════════════════════════
// APP STATE
// ════════════════════════════════════
const APP={currentUser:null,currentCourse:null,currentVideoId:null};

const COURSE_META={
  bio:{name:'สอวน. ชีวะ ค่าย 1',icon:'🧬',accent:'var(--bio)',badgeCls:'bio'},
  chem:{name:'สอวน. เคมี ค่าย 1',icon:'⚗️',accent:'var(--chem)',badgeCls:'chem'},
  com:{name:'สอวน. คอม ค่าย 1',icon:'💻',accent:'var(--com)',badgeCls:'com'},
};
const BADGE_STYLES={
  bio:'background:rgba(48,209,88,.12);color:var(--bio)',
  chem:'background:rgba(10,132,255,.12);color:var(--chem)',
  com:'background:rgba(191,90,242,.12);color:var(--com)',
};

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
function init(){
  const user=checkSession();
  if(user){
    APP.currentUser=user;
    showDashboard(user);
    startSessionWatch();
  } else {
    showLogin();
  }
}

// ════════════════════════════════════
// VIEWS
// ════════════════════════════════════
function showView(name){
  ['v-login','v-dashboard','v-course'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display=id===name?'block':'none';
  });
  const showTop=name!=='v-login';
  document.getElementById('topbar').style.display=showTop?'flex':'none';
  if(name==='v-course'){
    document.getElementById('v-course').style.display='block';
    document.getElementById('sidebar').style.display='flex';
  }
}
function showLogin(){showView('v-login');APP.currentUser=null;}
function showKicked(){
  clearInterval(sessInterval);
  clearSession();
  document.getElementById('kicked-overlay').classList.add('show');
}
function goToLogin(){
  document.getElementById('kicked-overlay').classList.remove('show');
  APP.currentUser=null;
  showLogin();
}

// ════════════════════════════════════
// LOGIN
// ════════════════════════════════════
async function doLogin(){
  const username=document.getElementById('lu').value.trim();
  const password=document.getElementById('lp').value;
  const btn=document.getElementById('loginBtn');
  const errEl=document.getElementById('loginErr');

  if(!username||!password){
    showLoginErr('กรุณากรอก Username และรหัสผ่าน');
    return;
  }

  btn.classList.add('loading');
  setTimeout(()=>{
    btn.classList.remove('loading');
    const users = await getUsers();
    const user=users.find(u=>u.username.toLowerCase()===username.toLowerCase()||u.email.toLowerCase()===username.toLowerCase());

    if(!user){showLoginErr('ไม่พบบัญชีนี้ในระบบ กรุณาติดต่อทีมงาน');return;}
    if(user.password!==btoa(encodeURIComponent(password))){showLoginErr('รหัสผ่านไม่ถูกต้อง');return;}
    if(user.status==='pending'){showLoginErr('บัญชีของคุณยังรอการอนุมัติจากทีมงาน กรุณารอสักครู่');return;}
    if(user.status==='rejected'){showLoginErr('บัญชีของคุณถูกปฏิเสธ กรุณาติดต่อทีมงาน');return;}

    // Valid → create new session (kicks old device)
    const token=genToken();
    user.activeSessionToken=token;
    user.activeSessionDevice=navigator.userAgent.slice(0,100);
    user.lastLoginAt=new Date().toISOString();
    const all=getUsers();
    const idx=all.findIndex(u=>u.id===user.id);
    if(idx>=0) all[idx]=user;
    saveUsers(all);
    saveSession(user.id,token);

    APP.currentUser=user;
    errEl.classList.remove('show');
    document.getElementById('lu').value='';
    document.getElementById('lp').value='';
    showDashboard(user);
    startSessionWatch();
  },600);
}
function showLoginErr(msg){
  const e=document.getElementById('loginErr');
  e.textContent=msg;e.classList.add('show');
}

// ════════════════════════════════════
// LOGOUT
// ════════════════════════════════════
function logout(){
  clearInterval(sessInterval);
  // Invalidate server-side token
  if(APP.currentUser){
    const all=getUsers();
    const u=all.find(x=>x.id===APP.currentUser.id);
    if(u){u.activeSessionToken=null;saveUsers(all);}
  }
  clearSession();
  APP.currentUser=null;
  APP.currentCourse=null;
  APP.currentVideoId=null;
  showLogin();
}

// ════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════
function showDashboard(user){
  showView('v-dashboard');

  const hour=new Date().getHours();
  const greeting=hour<12?'อรุณสวัสดิ์':'สวัสดีตอน'+(hour<17?'บ่าย':'เย็น');
  document.getElementById('dashGreeting').textContent=greeting+', '+user.nick+'!';
  document.getElementById('dashSub').textContent='ยินดีต้อนรับสู่ INeedPOSN · '+new Date().toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  // Update topbar
  document.getElementById('tbUser').textContent=user.nick||user.name;
  const cm=COURSE_META[user.courseKey]||{};
  const badge=document.getElementById('tbBadge');
  badge.textContent=cm.icon||''+'  '+(cm.name||'');
  badge.style.cssText=BADGE_STYLES[user.courseKey]||'';

  // Set accent color
  document.documentElement.style.setProperty('--accent',cm.accent||'var(--bio)');

  renderCourseCard(user);
}

function renderCourseCard(user){
  const cm=COURSE_META[user.courseKey]||{name:'คอร์ส',icon:'📚'};
  const content=getContent()[user.courseKey]||{videos:[],materials:[]};
  const watched=user.watchedVideos||[];
  const total=content.videos.length;
  const done=watched.length;
  const pct=total>0?Math.round(done/total*100):0;

  let statusHTML='';
  if(user.status==='pending'){
    statusHTML=`<div class="status-banner status-pending"><div class="sb-icon">⏳</div><div class="sb-text"><strong>รอการอนุมัติ</strong>ทีมงานกำลังตรวจสอบข้อมูลการชำระเงินของคุณ<br/>จะแจ้งผลทาง LINE/IG ภายใน 24 ชั่วโมง</div></div>`;
  } else if(user.status==='approved'){
    statusHTML=`<div class="status-banner status-approved"><div class="sb-icon">✅</div><div class="sb-text"><strong>อนุมัติแล้ว — พร้อมเรียน</strong>เข้าถึงบทเรียนได้เลย · ${done}/${total} บท (${pct}%)</div></div>`;
  } else {
    statusHTML=`<div class="status-banner status-rejected"><div class="sb-icon">❌</div><div class="sb-text"><strong>ไม่ผ่านการอนุมัติ</strong>กรุณาติดต่อทีมงานทาง IG หรือ LINE เพื่อแก้ไขปัญหา</div></div>`;
  }

  const progressHTML=user.status==='approved'&&total>0?`
    <div class="progress-bar-wrap">
      <div class="progress-label"><span>ความคืบหน้า</span><span>${done}/${total} บท (${pct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${cm.accent||'var(--bio)'}"></div></div>
    </div>`:'';

  const btnStyle=user.status==='approved'?`background:${cm.accent||'var(--bio)'};color:#fff`:'background:var(--sf3);color:var(--t3)';
  const lastLabel=user.lastVideoId&&user.status==='approved'?'ดูต่อ':'เข้าเรียน';

  document.getElementById('courseCardArea').innerHTML=`
    <div class="course-card-big">
      <div class="ccb-top">
        <div class="ccb-icon" style="background:rgba(255,255,255,.06)">${cm.icon}</div>
        <div class="ccb-info">
          <div class="ccb-eyebrow">คอร์สที่สมัคร</div>
          <div class="ccb-title">${cm.name}</div>
        </div>
      </div>
      ${statusHTML}
      ${progressHTML}
      <button class="btn-enter" style="${btnStyle}" ${user.status!=='approved'?'disabled':''} onclick="enterCourse()">
        ${user.status==='approved'?lastLabel+' →':'รอการอนุมัติ'}
      </button>
    </div>
  `;
}

// ════════════════════════════════════
// COURSE PLAYER
// ════════════════════════════════════
async function enterCourse(){
  const user = await checkSession();
  if(!user){showKicked();return;}

  APP.currentUser = user;
  APP.currentCourse = getContent()[user.courseKey] || {videos:[],materials:[]};
  showView('v-course');

  const cm = COURSE_META[user.courseKey] || {};
  document.getElementById('sidebarTitle').textContent = cm.name || 'คอร์ส';
  document.documentElement.style.setProperty('--accent',cm.accent||'var(--bio)');

  renderVideoList();

  const lastId = user.lastVideoId;
  const videos = APP.currentCourse.videos;

  if(lastId && videos.find(v=>v.id===lastId)){
    playVideo(lastId);
  } else if(videos.length>0){
    playVideo(videos[0].id);
  }
}

function renderVideoList(){
  const user=APP.currentUser;
  const course=APP.currentCourse;
  const watched=user.watchedVideos||[];
  const total=course.videos.length;
  const done=watched.length;
  const pct=total>0?Math.round(done/total*100):0;

  document.getElementById('sidebarProgress').textContent=`${done} / ${total} บทเรียน`;
  document.getElementById('sidebarProgFill').style.width=pct+'%';

  if(total===0){
    document.getElementById('videoList').innerHTML=`<div class="empty-state"><div class="big">📭</div><p>ยังไม่มีเนื้อหาในคอร์สนี้<br/>ทีมงานกำลังเพิ่มเนื้อหา</p></div>`;
    return;
  }

  document.getElementById('videoList').innerHTML=course.videos.map((v,i)=>{
    const isWatched=watched.includes(v.id);
    const isActive=v.id===APP.currentVideoId;
    return `
    <div class="video-item ${isWatched?'watched':''} ${isActive?'active':''}" id="vi-${v.id}" onclick="playVideo('${v.id}')">
      <div class="vi-num">${String(i+1).padStart(2,'0')}</div>
      <div class="vi-check">${isWatched?'✅':'⭕'}</div>
      <div class="vi-text">
        <div class="vi-title">${v.title}</div>
        <div class="vi-meta">${v.duration||''}</div>
      </div>
    </div>`;
  }).join('');
}

function playVideo(videoId){
  const course=APP.currentCourse;
  const video=course.videos.find(v=>v.id===videoId);
  if(!video) return;

  // Update state
  const prevId=APP.currentVideoId;
  APP.currentVideoId=videoId;

  // Update sidebar active state
  if(prevId) document.getElementById('vi-'+prevId)?.classList.remove('active');
  document.getElementById('vi-'+videoId)?.classList.add('active');

  // Embed YouTube
  const container=document.getElementById('videoContainer');
  container.innerHTML=`<iframe
    src="https://www.youtube-nocookie.com/embed/${video.ytId}?rel=0&modestbranding=1&color=white&autoplay=1"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen title="${video.title}"></iframe>`;

  // Video info
  const user=APP.currentUser;
  const watched=(user.watchedVideos||[]).includes(videoId);
  const cm=COURSE_META[user.courseKey]||{};
  const badgeStyle=BADGE_STYLES[user.courseKey]||'';

  document.getElementById('viTitle').textContent=video.title;
  document.getElementById('viDesc').textContent=video.description||'';
  document.getElementById('viBadgeRow').innerHTML=`
    <span class="vi-badge" style="${badgeStyle}">${cm.icon} ${cm.name}</span>
    ${video.duration?`<span class="vi-badge" style="background:var(--sf3);color:var(--t2)">⏱ ${video.duration}</span>`:''}
    ${watched?`<span class="vi-badge" style="background:rgba(48,209,88,.12);color:var(--bio)">✅ ดูแล้ว</span>`:''}
  `;

  const markBtn=document.getElementById('markBtn');
  if(watched){
    markBtn.textContent='✓ ดูแล้ว';
    markBtn.style.cssText='background:rgba(48,209,88,.12);color:var(--bio);border:1px solid rgba(48,209,88,.2)';
  } else {
    markBtn.textContent='⭕ ทำเครื่องหมายว่าดูแล้ว';
    markBtn.style.cssText='background:var(--sf2);color:var(--t2);border:1px solid var(--b2)';
  }
  document.getElementById('videoInfo').style.display='block';

  // Materials (course-level)
  const mats=course.materials||[];
  const matList=document.getElementById('matList');
  if(mats.length>0){
    matList.innerHTML=mats.map(m=>`
      <a class="mat-item" href="${m.url}" target="_blank" rel="noopener">
        <span class="mat-icon">${m.type==='pdf'?'📄':m.type==='video'?'🎬':m.type==='link'?'🔗':'📎'}</span>
        <span class="mat-name">${m.name}</span>
        <span class="mat-type">${(m.type||'file').toUpperCase()}</span>
      </a>`).join('');
  } else {
    matList.innerHTML='<div class="mat-empty">ยังไม่มีเอกสารประกอบในคอร์สนี้</div>';
  }
  document.getElementById('materialsSection').style.display='block';

  // Save last video
  const allUsers=getUsers();
  const idx=allUsers.findIndex(u=>u.id===user.id);
  if(idx>=0){
    allUsers[idx].lastVideoId=videoId;
    APP.currentUser=allUsers[idx];
    saveUsers(allUsers);
  }

  // On mobile close sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

async function toggleWatched(){
  const user = await checkSession();
  if(!user){showKicked();return;}

  const videoId = APP.currentVideoId;
  if(!videoId) return;

  const allUsers = await getUsers();
  const idx = allUsers.findIndex(u=>u.id===user.id);
  if(idx<0) return;

  let watched = allUsers[idx].watchedVideos || [];

  if(watched.includes(videoId)){
    watched = watched.filter(id=>id!==videoId);
    showToast('ยกเลิกเครื่องหมาย');
  } else {
    watched.push(videoId);
    showToast('✅ บันทึกแล้ว!','g');
  }

  allUsers[idx].watchedVideos = watched;

  // ❗ ตรงนี้ยังไม่ sync Google Sheet (ต้องทำเพิ่ม)
  saveUsers(allUsers);

  APP.currentUser = allUsers[idx];

  renderVideoList();
  playVideo(videoId);
}

// ════════════════════════════════════
// SIDEBAR TOGGLE (mobile)
// ════════════════════════════════════
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

// ════════════════════════════════════
// TOAST
// ════════════════════════════════════
let toastT;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  clearTimeout(toastT);toastT=setTimeout(()=>{t.className='toast';},2500);
}

// ════════════════════════════════════
// START
// ════════════════════════════════════
init();
</script>
